<div class='pinned-posts-container'>
  <div id='pinned-posts-root' class='pinned-posts-grid'>
    <svg class="pinned-loader" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none"></circle></svg>
  </div>
</div>

<style>
  .pinned-posts-container { font-family: var(--fontBody), sans-serif; padding: 20px 15px; max-width: 1100px; margin: 0 auto; }
  
  .pinned-posts-grid {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 15px !important;
  }

  @media screen and (min-width: 800px) {
  .pinned-posts-grid {
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 25px !important;
    }
  }
    
  .pinned-item {
    background-color: var(--themeBg) !important; border: 2px solid var(--themeBd-color) !important;
    border-radius: 12px !important; box-shadow: 5px 5px 0px 0px var(--themeBd-color) !important;
    padding: 15px !important; transition: transform 0.25s ease, box-shadow 0.25s ease !important;
    display: flex; flex-direction: column;
  }
  
  .pinned-item:hover { transform: translateY(-4px) translateX(-4px) !important; box-shadow: 9px 9px 0px 0px var(--themeLink) !important; }
  
  .pinned-thumb-link {
    display: flex !important; align-items: center !important; justify-content: center !important;
    width: 100%; margin-bottom: 8px !important; overflow: hidden !important;
    border-radius: 8px !important; aspect-ratio: 16/9 !important;
    background-color: var(--contentBg-sec) !important;
  }
  
  .pinned-thumb {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
    pointer-events: none;
  }
  
  .pinned-thumb-link .img.null {
    width: 100%;
    height: 100%;
    transition: transform 0.5s ease !important;
  }
  
  .pinned-item:hover .pinned-thumb,
  .pinned-item:hover .img.null { 
    transform: scale(1.08) !important; 
  }
  .pinned-title { margin: 0; text-align: center; font-size: 0.9rem; line-height: 1.4; font-family: var(--fontBody-alt); font-weight: 600; }
  .pinned-title a { color: var(--themeC); text-decoration: none; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .pinned-title a:hover { color: var(--themeLink); }
  
  .pinned-loader { display: block; grid-column: 1 / -1; width: 40px; height: 40px; margin: 40px auto; animation: pin-spin 2s linear infinite; }
  .pinned-loader circle { stroke: var(--themeLink); stroke-width: 4; stroke-linecap: round; animation: pin-dash 1.5s ease-in-out infinite; }
  @keyframes pin-spin { 100% { transform: rotate(360deg); } }
  @keyframes pin-dash { 0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; } 50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; } 100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; } }
</style>

<script>
(function() {
  const POST_URLS = [
    'https://www.ihfandicahyo.com/2026/02/aku-hanyalah-pulpen.html',
    'https://www.ihfandicahyo.com/2024/11/senandung-ilmu.html',
    'https://www.ihfandicahyo.com/2025/11/luruh.html',
    'https://www.ihfandicahyo.com/2025/11/nona-malam.html',
    'https://www.ihfandicahyo.com/2025/06/rembulan.html',
    'https://www.ihfandicahyo.com/2025/11/cinta-kata-kuncinya.html'
  ];

  async function fetchPostData(url) {
    try {
      const urlObj = new URL(url);
      const apiUrl = `${urlObj.origin}/feeds/posts/summary?alt=json&redirect=false&max-results=1&path=${urlObj.pathname}`;
      const res = await fetch(apiUrl);
      const data = await res.json();
      return (data.feed && data.feed.entry) ? data.feed.entry[0] : null;
    } catch (e) { return null; }
  }

  async function initPinned() {
    const root = document.getElementById('pinned-posts-root');
    if (!root) return;
    const results = await Promise.all(POST_URLS.map(url => fetchPostData(url)));
    const validResults = results.filter(post => post !== null);
    
    root.innerHTML = '';
    validResults.forEach((entry, index) => {
      if (entry && entry.title) {
        const title = entry.title.$t;
        const postUrl = entry.link.find(l => l.rel === 'alternate')?.href || POST_URLS[index];
        let imgUrl = entry.media$thumbnail ? entry.media$thumbnail.url.replace(/\/s\d+(\-c)?\//, '/s600-c/') : null;

        const card = document.createElement('div');
        card.className = 'pinned-item';
        
        // Memanfaatkan class tema .img.null
        const thumbContent = imgUrl 
          ? `<img class="pinned-thumb" src="${imgUrl}" alt="${title}" loading="lazy"/>` 
          : `<div class="img null"></div>`;

        card.innerHTML = `
          <a href="${postUrl}" class="pinned-thumb-link">${thumbContent}</a>
          <h3 class="pinned-title"><a href="${postUrl}">${title}</a></h3>
        `;
        root.appendChild(card);
      }
    });
  }

  window.addEventListener('load', initPinned);
})();
</script>
