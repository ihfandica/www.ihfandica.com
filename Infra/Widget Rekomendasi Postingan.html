<div id="median-related-wrapper" style="display:none; width:100%; box-sizing:border-box;">
  <div class="median-related-box">
    <div class="median-header">
      <h3 class="median-title">Baca Juga</h3>
      <a href="/search" class="median-more">Arsip Blog &rarr;</a>
    </div>
    
    <div id="median-content" class="median-container">
      <div class="median-card skeleton"></div>
      <div class="median-card skeleton"></div>
    </div>
  </div>
</div>

<style>
.median-related-box {
  margin: -30px 0 0 0;
  display: block;
  font-family: var(--fontBody, 'Inter', sans-serif) !important;
  width: 100%;
  clear: both;
}

.median-post-title,
.median-tag {
  font-family: 'Fira Sans', var(--fontBody-alt, sans-serif) !important;
}

.median-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  border-bottom: 2px solid var(--themeBd-color, #e4e3e1);
  padding-bottom: 10px;
}

.median-title {
  font-size: 1rem;
  font-weight: 400;
  margin: 0;
  color: var(--themeC, #333);
  position: relative;
}
.median-title::after {
  content: '';
  position: absolute;
  bottom: -12px;
  left: 0;
  width: 40px;
  height: 2px;
  background: var(--themeLink, #8875f5);
}
.median-more {
  font-size: 1rem;
  font-weight: 400;
  margin: 0;
  color: var(--themeLink, #8875f5);
  text-decoration: none;
}

.median-container {
  display: flex;
  flex-wrap: wrap;
  gap: 15px; 
}

.median-card {
  width: calc(50% - 7.5px); 
  display: flex;
  flex-direction: column;
  background-color: var(--themeBg, #fff) !important;
  border: 2px solid var(--themeBd-color) !important;
  border-radius: 12px !important;
  box-shadow: 5px 5px 0px 0px var(--themeBd-color) !important;
  padding: 15px !important;
  position: relative;
  text-decoration: none !important;
  box-sizing: border-box;
  transition: transform 0.25s ease, box-shadow 0.25s ease !important;
  flex-grow: 0;
  flex-shrink: 0;
  overflow: visible !important;
}

@media (min-width: 600px) {
  .median-card {
    width: calc(33.333% - 10px);
  }
}

.median-card:hover {
  transform: translateY(-4px) translateX(-4px) !important;
  box-shadow: 9px 9px 0px 0px var(--themeLink) !important;
}

.median-thumb {
  width: 100%;
  aspect-ratio: 16 / 9 !important;
  background-color: var(--contentBg-sec) !important;
  background: var(--contentBg-alt, #eee);
  position: relative;
  overflow: hidden;
  border-radius: 8px !important;
  margin-bottom: 8px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
}

.median-thumb img, 
.median-thumb .img.null {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
  will-change: transform;
}

.median-thumb img[src^="data:image/svg+xml"] {
  width: 50px !important;
  height: 50px !important;
  object-fit: contain !important;
  opacity: 0.3 !important; 
  transition: all 0.3s ease;
}

.median-card:hover .median-thumb img,
.median-card:hover .median-thumb .img.null {
  transform: scale(1.12) !important;
}

.drK .median-thumb img[src^="data:image/svg+xml"] {
  filter: invert(1) brightness(2) !important;
  opacity: 0.8 !important;
}

.median-info {
  padding: 0 !important;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.median-tag {
  font-size: 10px;
  text-transform: uppercase;
  color: var(--themeLink, #8875f5);
  font-weight: 500 !important;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 5px;
}

.median-post-title {
  color: var(--themeC, #333);
  margin: 0;
  font-size: 13px;
  line-height: 1.4;
  font-weight: 500 !important;;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.median-card:hover .median-post-title {
  color: var(--themeLink);
}

.skeleton {
  background: var(--contentBg-alt, #eee);
  height: 180px;
  animation: pulse 1s infinite alternate;
  border: 2px solid var(--themeBd-color) !important;
}

@keyframes pulse { from {opacity: 0.6;} to {opacity: 1;} }
</style>

<script>
//<![CDATA[
(function() {
  const config = {
    maxPosts: 6, 
    depth: 50,
    };
    
  function getPostTarget() {
    return document.getElementById('relatedPost') ||
           document.getElementById('postBody') || 
           document.querySelector('.post-body') || 
           document.querySelector('.entry-content') ||
           document.querySelector('.post-content');
  }

  function getContext() {
    const title = document.title.split('|')[0].trim();
    const labelEls = document.querySelectorAll('.post-labels a, span.label a, a[rel="tag"]');
    let labels = [];
    if(labelEls.length > 0) {
      labelEls.forEach(el => labels.push(el.innerText.trim().toLowerCase()));
    }
    
    const stopWords = ["king", "queen"];
    const keywords = title.toLowerCase().replace(/[^a-z0-9\s]/gi, '').split(' ')
      .filter(w => w.length > 3 && !stopWords.includes(w));

    return { labels, keywords };
  }

  async function initWidget() {
    if (window.location.pathname === "/" || window.location.pathname === "") return;
    const targetEl = getPostTarget();
    const wrapper = document.getElementById('median-related-wrapper');
    
    if (!targetEl || !wrapper) {
      console.log('median Widget: Target element not found.');
      return;
    }

    targetEl.parentNode.insertBefore(wrapper, targetEl.nextSibling);
    wrapper.style.display = "block";

    const context = getContext();

    try {
      const resTotal = await fetch('/feeds/posts/summary?alt=json&max-results=0');
      const jsonTotal = await resTotal.json();
      const totalPosts = parseInt(jsonTotal.feed.openSearch$totalResults.$t);
      const maxIndex = Math.max(1, totalPosts - config.depth);
      const randomIndex = Math.floor(Math.random() * maxIndex) + 1;
      const [resRecent, resOld] = await Promise.all([
        fetch(`/feeds/posts/summary?alt=json&max-results=${config.depth}`),
        fetch(`/feeds/posts/summary?alt=json&start-index=${randomIndex}&max-results=${config.depth}`)
      ]);

      const dataRecent = await resRecent.json();
      const dataOld = await resOld.json();
      const allEntries = [...(dataRecent.feed.entry || []), ...(dataOld.feed.entry || [])];
      processEntries(allEntries, context);
    } catch (e) {
      console.error("median Widget Error:", e);
      document.getElementById('median-content').innerHTML = '<small>Gagal memuat rekomendasi.</small>';
    }
  }

  function processEntries(entries, context) {
    let candidates = [];
    const currentPath = window.location.pathname.replace(/\?.*/, '').replace(/\/$/, '').replace(/\.html$/, ''); 
    const addedLinks = new Set(); 

    entries.forEach(entry => {
      const alternateLink = entry.link.find(l => l.rel === 'alternate');
      if (!alternateLink) return;

      const fullLink = alternateLink.href;
      const linkPath = new URL(fullLink).pathname.replace(/\?.*/, '').replace(/\/$/, '').replace(/\.html$/, '');

      if (linkPath === currentPath || addedLinks.has(linkPath)) return;      
      addedLinks.add(linkPath);

      const title = entry.title.$t;
      let score = 0;
      let tagName = 'Arsip';
      if (entry.category) {
        entry.category.forEach(cat => {
          if (context.labels.includes(cat.term.toLowerCase())) {
            score += 5;
            tagName = cat.term;
          }
        });
      }
      
      const titleLower = title.toLowerCase();
      context.keywords.forEach(kw => {
        if (titleLower.includes(kw)) score += 2;
      });

      let img = null;
      if (entry.media$thumbnail) {
        img = entry.media$thumbnail.url.replace(/\/s[0-9]+(\-c)?\//, "/w300-h168-p-k-no-nu/");
      }

      candidates.push({
        title: title,
        link: fullLink,
        img: img,
        tag: tagName,
        finalScore: score + Math.random() 
      });
    });

    candidates.sort((a, b) => b.finalScore - a.finalScore);

    renderHTML(candidates.slice(0, config.maxPosts));
  }

  function renderHTML(posts) {
    const container = document.getElementById('median-content');
    
    if (posts.length === 0) {
      container.innerHTML = '<div style="width:100%;text-align:center;opacity:0.6;font-size:12px">Belum ada rekomendasi.</div>';
      return;
    }

    let html = '';
    posts.forEach(p => {
      const thumbContent = p.img 
      ? `<img src="${p.img}" alt="${p.title}" loading="lazy">` 
      : `<div class="img null"></div>`;

    html += `
      <a href="${p.link}" class="median-card" title="${p.title}">
        <div class="median-thumb">
          ${thumbContent}
        </div>
        <div class="median-info">
          <span class="median-tag">${p.tag}</span>
          <h4 class="median-post-title">${p.title}</h4>
        </div>
      </a>`; 
      });
      container.innerHTML = html;
     }

  window.addEventListener('load', initWidget);

})();
//]]>
</script>
